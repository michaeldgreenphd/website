name: Update Scholar Dashboard

on:
  schedule:
    # Daily at 06:23 UTC (odd minute avoids the top-of-hour cron rush)
    - cron: '23 6 * * *'
  workflow_dispatch: {}  # allows manual runs from the Actions tab

permissions:
  contents: write  # required to commit the refreshed artifacts

concurrency:
  group: scholar-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install scholarly matplotlib

      - name: Install DM Sans so the chart matches site typography
        # Best-effort: the script falls back to DejaVu Sans if this fails
        run: |
          mkdir -p ~/.fonts
          curl -fsSL -o ~/.fonts/DMSans.ttf \
            "https://github.com/google/fonts/raw/main/ofl/dmsans/DMSans%5Bopsz%2Cwght%5D.ttf" || true
          fc-cache -f ~/.fonts || true
          rm -rf ~/.cache/matplotlib || true

      - name: Fetch Scholar data and render charts
        run: python scripts/fetch_scholar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar_stats.json citations_over_time.png citations_over_time_dark.png
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Google Scholar dashboard data"
            git push
          fi
