name: Update Site Data (Scholar + Substack)

on:
  schedule:
    # Daily at 06:23 UTC (odd minute avoids the top-of-hour cron rush)
    - cron: '23 6 * * *'
  workflow_dispatch: {}  # allows manual runs from the Actions tab
  push:
    # Also run when the pipeline itself changes, so fixes are testable
    # immediately on any branch
    paths:
      - '.github/workflows/update-scholar.yml'
      - 'scripts/fetch_scholar.py'
      - 'scripts/fetch_substack.py'

permissions:
  contents: write  # required to commit the refreshed artifacts

concurrency:
  group: scholar-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # httpx is pinned <0.28 because scholarly's proxy support passes the
        # removed `proxies=` kwarg to httpx.Client on newer versions
        run: pip install scholarly matplotlib free-proxy "httpx<0.28"

      - name: Install DM Sans so the chart matches site typography
        # Best-effort: the script falls back to DejaVu Sans if this fails
        run: |
          mkdir -p ~/.fonts
          curl -fsSL -o ~/.fonts/DMSans.ttf \
            "https://github.com/google/fonts/raw/main/ofl/dmsans/DMSans%5Bopsz%2Cwght%5D.ttf" || true
          fc-cache -f ~/.fonts || true
          rm -rf ~/.cache/matplotlib || true

      # The two fetchers run independently: one failing must not block the
      # other's artifacts from being committed.
      - name: Fetch Substack posts
        id: substack
        continue-on-error: true
        run: python scripts/fetch_substack.py

      - name: Fetch Scholar data and render charts
        id: scholar
        continue-on-error: true
        run: python scripts/fetch_scholar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar_stats.json citations_over_time.png citations_over_time_dark.png substack_posts.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update site data (Scholar dashboard / Substack posts)"
            # Rebase onto any commits pushed while this job ran so the push
            # can't fail as non-fast-forward
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: Surface fetch failures
        if: steps.scholar.outcome == 'failure' || steps.substack.outcome == 'failure'
        run: |
          echo "::error::Fetch outcomes — scholar: ${{ steps.scholar.outcome }}, substack: ${{ steps.substack.outcome }}"
          exit 1
